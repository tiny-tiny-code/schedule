services:
  - type: web
    name: research-scheduler
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DATA_DIR
        value: /data
    disk:
      name: scheduler-data
      mountPath: /data
      sizeGB: 1
